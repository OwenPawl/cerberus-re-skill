interface:
  display_name: "Cerberus RE"
  short_description: "Local Apple-focused RE workbench for a Ghidra, LLDB, and Frida loop"
  default_prompt: "Use Cerberus RE to import this binary into Ghidra, export structured artifacts, and correlate static findings with LLDB or Frida evidence."

policy:
  allow_implicit_invocation: true

# Entry points (Python package – install with: pip install -e .)
commands:
  bootstrap: "python -m cerberus_re_skill bootstrap"
  doctor: "python -m cerberus_re_skill doctor"
  bridge_arm: "python -m cerberus_re_skill bridge arm"
  bridge_disarm: "python -m cerberus_re_skill bridge disarm"
  bridge_call: "python -m cerberus_re_skill bridge call"
  bridge_status: "python -m cerberus_re_skill bridge status"
  bridge_sessions: "python -m cerberus_re_skill bridge sessions"
  bridge_build: "python -m cerberus_re_skill bridge build"
  bridge_install: "python -m cerberus_re_skill bridge install"
  notes_add: "python -m cerberus_re_skill notes add"
  notes_sync: "python -m cerberus_re_skill notes sync"
  notes_pull: "python -m cerberus_re_skill notes pull"
  notes_status: "python -m cerberus_re_skill notes status"
  notes_remediate: "python -m cerberus_re_skill notes remediate"
  notes_open_shared: "python -m cerberus_re_skill notes open-shared"
  import_analyze: "python -m cerberus_re_skill import analyze"
  import_macos_framework: "python -m cerberus_re_skill import macos-framework"
  import_run_script: "python -m cerberus_re_skill import run-script"
