name: Cross-platform CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e .

      - name: Smoke test - module help
        run: python -m cerberus_re_skill --help

      - name: Smoke test - cerberus-re CLI
        run: cerberus-re --help

      - name: Run unittest suite
        run: python -m unittest discover -s tests

      - name: Verify only allowed .sh files remain (Unix)
        if: runner.os != 'Windows'
        run: |
          # These files are sourced libraries, not standalone command wrappers.
          found=$(find . -name "*.sh" \
            -not -path "./.git/*" \
            -not -path "./scripts/common.sh" \
            -not -path "./scripts/shell_lib/common_core.sh" \
            -not -path "./scripts/shell_lib/common_bridge.sh" \
            2>/dev/null || true)
          if [ -n "$found" ]; then
            echo "FAIL: unexpected .sh files present:"
            echo "$found"
            exit 1
          else
            echo "OK: only allowed .sh files found"
          fi

      - name: Verify only allowed .sh files remain (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $allowed = @("scripts\common.sh", "scripts\shell_lib\common_core.sh", "scripts\shell_lib\common_bridge.sh")
          $files = Get-ChildItem -Recurse -Filter "*.sh" -ErrorAction SilentlyContinue |
                   Where-Object { $_.FullName -notlike "*\.git\*" } |
                   Where-Object { $rel = $_.FullName.Substring((Get-Location).Path.Length + 1); $rel -notin $allowed }
          if ($files) {
            Write-Error "FAIL: unexpected .sh files present: $($files.FullName -join ', ')"
            exit 1
          } else {
            Write-Output "OK: only allowed .sh files found"
          }
